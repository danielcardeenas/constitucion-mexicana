name: Revisar PR de reforma

# Se ejecuta en cada PR. Dos partes:
#   validar  — invariantes deterministas. Es el GATE: si falla, no se debe mergear
#              (actívalo como required check en branch protection).
#   resumir  — comentario asistido por LLM con resumen + banderas de corrupción.
#              Es solo apoyo de revisión (no decide).

on:
  pull_request: {}

permissions:
  contents: read
  pull-requests: write

env:
  EXTRACTOR_REPO: https://github.com/danielcardeenas/constitucion-extractor.git
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Clonar extractor e instalar dependencias
        run: |
          git clone --depth 1 "$EXTRACTOR_REPO" /tmp/extractor
          pip install -r /tmp/extractor/requirements.txt
      - name: Validar invariantes (GATE)
        run: |
          git fetch -q origin "${{ github.base_ref }}"
          cd /tmp/extractor
          PYTHONPATH=/tmp/extractor python -m extractor validar \
            --out "$GITHUB_WORKSPACE" --base "origin/${{ github.base_ref }}"

  resumir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Clonar extractor e instalar OpenAI
        run: |
          git clone --depth 1 "$EXTRACTOR_REPO" /tmp/extractor
          pip install openai
      - name: Resumir cambios y comentar el PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Sin OPENAI_API_KEY: omito el resumen asistido."; exit 0
          fi
          git fetch -q origin "${{ github.base_ref }}"
          python /tmp/extractor/scripts/resumir_pr.py \
            "$GITHUB_WORKSPACE" "origin/${{ github.base_ref }}" > /tmp/resumen.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --body-file /tmp/resumen.md
